<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Conversor de Dinheiro</title>
</head>
<body>
    <header>
        <img class="logo" src="assets/Logo gif.gif" alt="Logo conversor de dinheiro">
    </header>

    <main>
        <label>
            Converter <b>de</b>
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar"> U$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
                <option value="bitcoin"> ₿ Bitcoin</option>
            </select>
        </label>

        <label>
            Valor
            <input class="input-currency" placeholder="R$ 10.000,00" type="">
        </label>

        <button class="convert-button" >Converter</button>

        <section>
            <div class="currency-box">
                <img src="assets/img moeda.png" alt="logo-moeda-a-converter">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert" >R$ 0,00</p>
            </div>

            <img class="img-arrow" src="assets/img setinha.png" alt="seta">

             <div class="currency-box">
                <img class="currency-img" src="assets/img dollar.png" alt="logo-moeda-a-convertida">
                <p class="currency" id="currency-name">Dólar</p>
                <p class="currency-value">U$ 0.0</p>
            </div>
        </section>
    </main>
</body>
<script src="scripts.js"></script>
</html>
